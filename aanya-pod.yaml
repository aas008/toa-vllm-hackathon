apiVersion: v1
kind: Pod
metadata:
  name: aanya-vllm-test-pod
  namespace: toa-hack
  labels:
    app: toa-hack
spec:
  containers:
  - name: vllm
    image: vllm/vllm-openai:v0.19.1
    args:
    - --model
    - /models/facebook/opt-125m
    - --port
    - "8000"
    - --dtype
    - auto
    securityContext:
      runAsUser: 0
    env:
    - name: HF_HOME
      value: /tmp/hf-cache
    ports:
    - containerPort: 8000
      name: http
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
        nvidia.com/gpu: "1"
      limits:
        nvidia.com/gpu: "1"
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 5
    volumeMounts:
    - name: model-storage
      mountPath: /models
  volumes:
  - name: model-storage
    persistentVolumeClaim:
      claimName: vllm-model-pvc
  restartPolicy: Never
