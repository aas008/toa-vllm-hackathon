apiVersion: v1
kind: Pod
metadata:
  name: vllm-baseline
  namespace: toa-hack
  labels:
    app: toa-hack
spec:
  containers:
  - name: vllm
    image: vllm/vllm-openai:v0.19.1
    args:
    - --model
    - /models/RedHatAI/Llama-3.2-1B-Instruct-FP8
    - --served-model-name
    - RedHatAI/Llama-3.2-1B-Instruct-FP8
    - --port
    - "8000"
    - --dtype
    - auto
    securityContext:
      runAsUser: 0
    env:
    - name: HF_HOME
      value: /tmp/hf-cache
    ports:
    - containerPort: 8000
      name: http
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
        nvidia.com/gpu: "1"
      limits:
        nvidia.com/gpu: "1"
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 5
    volumeMounts:
    - name: model-storage
      mountPath: /models
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
            - psap-gpu-xhnvx-worker-3-5g8cv
            - psap-gpu-xhnvx-worker-3-6bsjp
  volumes:
  - name: model-storage
    persistentVolumeClaim:
      claimName: vllm-model-pvc
  restartPolicy: Never
